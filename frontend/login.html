<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Signup Form</title>
    <link rel="stylesheet" href="CSS/login_style.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="form-container sign-up-container">
            <form id="signupForm">
                <h1>Sign Up</h1>
                <div class="social-container">
                    <a href="https://www.facebook.com" target="_blank" class="social"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook"></a>
                    <a href="https://google.com" target="_blank" class="social"><img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google"></a>
                    <a href="https://linkedin.com" target="_blank" class="social"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn"></a>
                </div>
                <!-- Add message div -->
                <div id="signupMsg" style="color: red; font-size: 0.9em; margin-bottom: 10px;"></div>
                <input type="text" id="signupUsername" placeholder="Username" required />
                <input type="email" id="signupEmail" placeholder="Email" required />
                <input type="password" id="signupPassword" placeholder="Password" required />
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <div class="form-container login-container">
            <form id="loginForm">
                <h1>Login</h1>
                <div class="social-container">
                    <a href="https://facebook.com" target="_blank" class="social"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook"></a>
                    <a href="https://google.com" target="_blank" class="social"><img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google"></a>
                    <a href="https://linkedin.com" target="_blank" class="social"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn"></a>
                </div>
                <!-- Add message div -->
                <div id="loginMsg" style="color: red; font-size: 0.9em; margin-bottom: 10px;"></div>
                <input type="text" id="loginUsername" placeholder="Username" required />
                <input type="password" id="loginPassword" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>Please login with your personal info</p>
                    <button class="ghost" id="login">Login</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p class="para">Enter your details and start your journey with us</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>
    <script src="javascript/login_script.js"></script>
</body>
</html>
